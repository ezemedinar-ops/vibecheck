<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeCheck — Your Musical DNA</title>
  <meta name="description" content="Turn your Spotify history into an editorial experience. Your top tracks, audio DNA, and mood — visualized.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="dark">

  <div class="landing">

    <!-- Nav -->
    <nav class="landing-nav">
      <span class="nav-logo">VibeCheck</span>
      <button class="btn btn-ghost btn-sm" id="theme-toggle-landing" aria-label="Toggle theme">☀</button>
    </nav>

    <!-- Hero -->
    <section class="landing-hero">
      <p class="hero-eyebrow">Powered by Spotify</p>

      <h1 class="hero-title">
        Your<br>
        Music<br>
        <span class="accent">DNA.</span>
      </h1>

      <p class="hero-subtitle">
        Top tracks. Audio fingerprint. Hipster score. Mood analysis.
        Everything Spotify knows about your taste — designed like a zine.
      </p>

      <div class="hero-cta">
        <button class="btn btn-primary" id="login-btn">
          <svg class="spotify-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
          </svg>
          Connect with Spotify
        </button>
      </div>

      <div class="error-msg" id="error-msg"></div>
    </section>

    <!-- Feature Strip -->
    <div class="features-strip">
      <div class="feature-item">
        <div class="feature-number">01</div>
        <div class="feature-name">The Holy Trinity</div>
      </div>
      <div class="feature-item">
        <div class="feature-number">02</div>
        <div class="feature-name">Audio DNA</div>
      </div>
      <div class="feature-item">
        <div class="feature-number">03</div>
        <div class="feature-name">Hipster Meter</div>
      </div>
      <div class="feature-item">
        <div class="feature-number">04</div>
        <div class="feature-name">Mood Tracker</div>
      </div>
      <div class="feature-item">
        <div class="feature-number">05</div>
        <div class="feature-name">The Receipt</div>
      </div>
    </div>

  </div><!-- .landing -->

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Theme toggle
    const savedTheme = localStorage.getItem('vc_theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);
    const toggleBtn = document.getElementById('theme-toggle-landing');
    toggleBtn.textContent = savedTheme === 'dark' ? '☀' : '◑';

    toggleBtn.addEventListener('click', () => {
      const current = document.body.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.body.setAttribute('data-theme', next);
      localStorage.setItem('vc_theme', next);
      toggleBtn.textContent = next === 'dark' ? '☀' : '◑';
    });

    // Show error from redirect params
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    if (error) {
      const el = document.getElementById('error-msg');
      const msgs = {
        state_mismatch: 'Authentication failed: state mismatch. Please try again.',
        token_error: 'Could not get access token. Please try again.',
        load_failed: 'Failed to load your data. Please try again.',
        access_denied: 'You cancelled the Spotify authorization.',
      };
      el.textContent = msgs[error] || `Error: ${error}`;
      el.classList.add('visible');
    }

    // If already logged in, redirect to dashboard
    if (isLoggedIn()) {
      window.location.href = '/dashboard.html';
    }

    document.getElementById('login-btn').addEventListener('click', login);
  </script>

</body>
</html>
