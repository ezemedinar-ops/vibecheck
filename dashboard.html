<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeCheck — Your Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading">
    <div class="loading-logo">VibeCheck</div>
    <div class="loading-wave" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="loading-text" id="loading-text">Reading your soul...</div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard hidden" id="dashboard">

    <!-- Header -->
    <header class="dashboard-header">
      <div class="header-logo">VibeCheck</div>
      <div class="header-user">
        <img class="header-avatar" id="user-avatar" src="" alt="User avatar">
        <span class="header-username" id="user-name"></span>
      </div>
      <div class="header-controls">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">☀</button>
        <button class="btn btn-ghost btn-sm" id="logout-btn">Exit</button>
      </div>
    </header>

    <!-- Main -->
    <main class="dashboard-main">

      <!-- PROFILE HERO -->
      <section class="profile-hero">
        <img class="profile-avatar" id="profile-avatar" src="" alt="Profile photo">
        <div class="profile-info">
          <div class="profile-name" id="profile-name"></div>
          <div class="profile-meta" id="profile-meta"></div>
          <a class="profile-link btn btn-ghost btn-sm" id="profile-link" href="#" target="_blank" rel="noopener" style="display:none">
            Open in Spotify ↗
          </a>
        </div>
      </section>

      <!-- MODULE 1 — TOP TRACKS + TOP ARTISTS -->
      <section class="module-trinity">
        <div class="module-label">01 / Top Tracks &amp; Artists</div>
        <div class="trinity-grid trinity-grid-2">

          <div class="trinity-col">
            <div class="trinity-col-header">
              <div class="trinity-col-title">Top Tracks</div>
              <div class="mini-tabs" id="track-tabs">
                <button class="mini-tab" data-range="short_term">4W</button>
                <button class="mini-tab active" data-range="medium_term">6M</button>
                <button class="mini-tab" data-range="long_term">ALL</button>
              </div>
            </div>
            <ol class="trinity-list" id="top-tracks-list"></ol>
          </div>

          <div class="trinity-col">
            <div class="trinity-col-header">
              <div class="trinity-col-title">Top Artists</div>
              <div class="mini-tabs" id="artist-tabs">
                <button class="mini-tab" data-range="short_term">4W</button>
                <button class="mini-tab active" data-range="medium_term">6M</button>
                <button class="mini-tab" data-range="long_term">ALL</button>
              </div>
            </div>
            <ol class="trinity-list" id="top-artists-list"></ol>
          </div>

        </div>
      </section>

      <!-- MODULE 2 + 3 — HIPSTER METER + STATS -->
      <div class="module-row">
        <div class="module-cell">
          <div class="module-label">02 / Hipster Meter</div>
          <div class="hipster-number" id="hipster-value">--</div>
          <div class="hipster-unit">% underground</div>
          <div class="hipster-bar-wrap">
            <div class="hipster-bar-fill" id="hipster-bar-fill" style="width:0%"></div>
          </div>
          <p class="hipster-desc" id="hipster-desc"></p>
        </div>
        <div class="module-cell">
          <div class="module-label">03 / Listening Stats</div>
          <div class="stats-grid" id="stats-grid"></div>
        </div>
      </div>

      <!-- MODULE 4 + 5 — RECENTLY PLAYED + THE RECEIPT -->
      <div class="module-row module-row-equal">
        <div class="module-cell">
          <div class="module-label">04 / Recently Played</div>
          <ol class="trinity-list" id="recently-played-list"></ol>
        </div>
        <div class="module-cell">
          <div class="module-label">05 / The Receipt</div>
          <div class="receipt-paper" id="receipt-content"></div>
        </div>
      </div>

    </main>
  </div><!-- .dashboard -->

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    document.getElementById('logout-btn').addEventListener('click', logout);
  </script>

</body>
</html>
